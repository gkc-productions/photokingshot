<svg width="360" height="110" viewBox="0 0 360 110" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PhotoKingShot by GKC Productions</title>
  <desc id="desc">Gold camera and crown mark with PhotoKingShot wordmark.</desc>

  <defs>
    <style>
      .gold { stroke: #D9A93B; fill: none; }
      .goldFill { fill: #D9A93B; }
      .whiteFill { fill: #FFFFFF; }
      .darkFill { fill: #111111; }
      .word { font-family: Inter, Arial, Helvetica, sans-serif; font-weight: 800; letter-spacing: -1px; }
      .sub { font-family: Inter, Arial, Helvetica, sans-serif; font-weight: 700; letter-spacing: 5px; }
    </style>
  </defs>

  <!-- Camera body -->
  <rect x="24" y="38" width="80" height="56" rx="13" class="gold" stroke-width="5"/>

  <!-- Camera top line / flash block -->
  <path d="M30 38H45L51 28H78L84 38H99" class="gold" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Crown -->
  <path d="M48 27L60 10L72 27L84 10L96 27" class="gold" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M51 27H93" class="gold" stroke-width="5" stroke-linecap="round"/>

  <!-- Small camera side details -->
  <path d="M17 55H30" class="gold" stroke-width="5" stroke-linecap="round"/>
  <path d="M90 54H98" class="gold" stroke-width="4" stroke-linecap="round"/>

  <!-- Lens circle -->
  <circle cx="64" cy="66" r="22" class="gold" stroke-width="5"/>

  <!-- Aperture blades -->
  <path d="M64 44V66L48 52" class="goldFill"/>
  <path d="M82 54L64 66L68 45" class="goldFill"/>
  <path d="M84 74L64 66L82 54" class="goldFill"/>
  <path d="M64 88V66L84 74" class="goldFill"/>
  <path d="M46 78L64 66L60 87" class="goldFill"/>
  <path d="M44 58L64 66L46 78" class="goldFill"/>

  <!-- Wordmark -->
  <text x="125" y="59" class="word whiteFill" font-size="31">PhotoKing</text>
  <text x="288" y="59" class="word goldFill" font-size="31">Shot</text>

  <!-- Subline and divider -->
  <text x="128" y="83" class="sub goldFill" font-size="10">BY GKC PRODUCTIONS</text>
  <path d="M128 91H337" stroke="#D9A93B" stroke-width="2" stroke-linecap="round"/>
</svg>
